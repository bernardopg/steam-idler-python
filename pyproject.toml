[project]
name = "steam-idle-bot"
version = "0.1.0"
description = "Steam Idle Bot with Trading Card Support"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "cachetools==7.0.5",
    "certifi==2026.2.25",
    "charset-normalizer==3.4.7",
    "eventemitter==0.2.0",
    "gevent==25.9.1",
    "gevent-eventemitter==2.1",
    "greenlet==3.3.2",
    "idna==3.11",
    "protobuf==3.20.3",
    "pydantic==2.12.5",
    "pydantic-settings==2.13.1",
    "pycryptodomex==3.23.0",
    "requests==2.33.1",
    "rich==14.3.3",
    "six==1.17.0",
    "steam>=1.4.0,<1.5.0",
    "steamclient==1.2",
    "urllib3==2.6.3",
    "vdf==3.4",
    "zope-event==6.1",
    "zope-interface==8.3",
]

[dependency-groups]
dev = [
    "mypy>=1.19.1",
    "pytest>=9.0.2",
    "pytest-cov>=7.1.0",
    "ruff>=0.15.9",
    "types-requests>=2.32.4.20260107",
]

[tool.mypy]
mypy_path = "src"
explicit_package_bases = true
disallow_untyped_defs = false
ignore_missing_imports = true
